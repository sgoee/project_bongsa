<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 분석</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f9fafb;
            --text-color: #111827;
            --sidebar-width: 250px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
        }

        .blind {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
        }

        /* Header & Sidebar */
        header {
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .side_toggle_btn {
            cursor: pointer;
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .side_toggle_btn:hover {
            background: #f3f4f6;
        }

        .side_toggle_btn::before {
            content: "☰";
        }

        .side_input:checked + .side_toggle_btn::before {
            content: "✕";
        }

        .side_list {
            position: fixed;
            left: calc(-1 * var(--sidebar-width));
            top: 60px;
            bottom: 0;
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid #e5e7eb;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
            padding-top: 20px;
        }

        .side_input:checked ~ .side_list {
            transform: translateX(var(--sidebar-width));
        }

        .side_link {
            display: block;
            padding: 15px 25px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .side_link:hover {
            background: #f3f4f6;
            color: var(--primary-color);
            padding-left: 30px;
        }

        /* Main Content Layout */
        main {
            padding-top: 80px;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            height: 100vh;
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
        }

        .section_top {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .section_bottom {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            border: 1px solid #e5e7eb;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card_title {
            align-self: flex-start;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        /* File Upload Area */
        .upload_area {
            border: 2px dashed #cbd5e1;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload_area:hover {
            background: #f8fafc;
        }

        .upload_icon {
            font-size: 40px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        /* Visualization Placeholder */
        .graph_area {
            width: 100%;
            height: 100%;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-weight: 500;
        }

        /* Model Selection Buttons */
        .model_select {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn_model {
            padding: 15px;
            border: 1px solid var(--primary-color);
            background: #fff;
            color: var(--primary-color);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn_model.active, .btn_model:hover {
            background: var(--primary-color);
            color: #fff;
        }

        /* Prediction Area */
        .predict_area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .input_group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input_group label {
            font-size: 14px;
            color: #64748b;
        }

        .input_field {
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn_predict {
            padding: 15px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn_predict:hover {
            background: #4338ca;
        }

    </style>
</head>
<body>
    <header>
        <input type="checkbox" id="side_btn" class="side_input blind" />
        <label for="side_btn" class="side_toggle_btn"></label>
        <div class="side_list">
            <a href="main.html" class="side_link">메인화면</a>
            <a href="data_analyze.html" class="side_link">데이터 분석</a>
            <a href="ai_api.html" class="side_link">인공지능 채팅</a>
            <a href="#" class="side_link">데이터 입력</a>
        </div>
    </header>

    <main>
        <div class="section_top">
            <div class="card">
                <div class="card_title">데이터 선택</div>
                <div class="upload_area">
                    <span class="upload_icon">➕</span>
                    <span style="color: #64748b;">파일을 선택해 주세요</span>
                </div>
            </div>
            <div class="card">
                <div class="card_title">데이터 시각화</div>
                <div class="graph_area">
                    이곳에 그래프가 표시됩니다.
                </div>
            </div>
        </div>

        <div class="section_bottom">
            <div class="card">
                <div class="card_title">모델 선택</div>
                <div class="model_select">
                    <button class="btn_model">회귀 분석 모델</button>
                    <button class="btn_model">분류 분석 모델</button>
                </div>
            </div>
            <div class="card">
                <div class="card_title">예측 실행</div>
                <div class="predict_area">
                    <div class="input_group">
                        <label>예측할 값 입력</label>
                        <input type="text" class="input_field" placeholder="입력값을 넣어주세요">
                    </div>
                    <button class="btn_predict">예측 결과 확인하기</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
