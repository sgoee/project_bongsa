<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 채팅</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f9fafb;
            --text-color: #111827;
            --sidebar-width: 250px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
        }

        .blind {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
        }

        /* Header & Sidebar */
        header {
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .side_toggle_btn {
            cursor: pointer;
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .side_toggle_btn:hover {
            background: #f3f4f6;
        }

        .side_toggle_btn::before {
            content: "☰";
        }

        .side_input:checked + .side_toggle_btn::before {
            content: "✕";
        }

        .side_list {
            position: fixed;
            left: calc(-1 * var(--sidebar-width));
            top: 60px;
            bottom: 0;
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid #e5e7eb;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
            padding-top: 20px;
        }

        .side_input:checked ~ .side_list {
            transform: translateX(var(--sidebar-width));
        }

        .side_link {
            display: block;
            padding: 15px 25px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .side_link:hover {
            background: #f3f4f6;
            color: var(--primary-color);
            padding-left: 30px;
        }

        /* Chat Layout */
        main {
            padding-top: 60px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
            max-width: 800px;
            margin: 0 auto;
            border-left: 1px solid #e5e7eb;
            border-right: 1px solid #e5e7eb;
        }

        .chat_container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--bg-color);
        }

        /* Message Bubbles */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
        }

        .message.ai {
            align-self: flex-start;
            background: #fff;
            color: var(--text-color);
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 2px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-color);
            color: #fff;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        /* Input Area */
        .input_area {
            height: 80px;
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat_input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #e5e7eb;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat_input:focus {
            border-color: var(--primary-color);
        }

        .send_btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .send_btn:hover {
            transform: scale(1.05);
            background: #4338ca;
        }

    </style>
</head>
<body>
    <header>
        <input type="checkbox" id="side_btn" class="side_input blind" />
        <label for="side_btn" class="side_toggle_btn"></label>
        <div class="side_list">
            <a href="main.html" class="side_link">메인화면</a>
            <a href="data_analyze.html" class="side_link">데이터 분석</a>
            <a href="ai_api.html" class="side_link">인공지능 채팅</a>
            <a href="#" class="side_link">데이터 입력</a>
        </div>
    </header>

    <main>
        <div class="chat_container">
            <div class="message ai">
                안녕하세요! 자취꾸미 AI 도우미입니다. <br>
                무엇을 도와드릴까요?
            </div>
            <div class="message user">
                데이터 분석 결과에 대해 궁금한 점이 있어요.
            </div>
            <div class="message ai">
                네, 어떤 부분이 궁금하신가요? 분석하신 데이터의 경향성이나 예측 결과에 대해 설명해 드릴 수 있습니다.
            </div>
        </div>

        <div class="input_area">
            <input type="text" class="chat_input" placeholder="메시지를 입력하세요...">
            <button class="send_btn">➔</button>
        </div>
    </main>
</body>
</html>
